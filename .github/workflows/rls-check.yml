name: checks

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  rls-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Falla si una tabla con lab_id no tiene RLS en _post.sql (anti-drift de la auditoria).
      - name: RLS coverage
        run: node scripts/check-rls-coverage.mjs
